<!DOCTYPE html>
<html dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشخيص مشكلة مشغل الفيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: #3b82f6;
            margin-bottom: 30px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .diagnostic-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .diagnostic-section h2 {
            color: #fbbf24;
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            padding-bottom: 10px;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
        }

        .status-label {
            color: #94a3b8;
            font-weight: bold;
        }

        .status-value {
            padding: 6px 12px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 4px;
            color: #3b82f6;
        }

        .status-value.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-value.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        input,
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .log-output {
            background: #000;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
            color: #10b981;
            margin-top: 10px;
        }

        .log-line {
            padding: 4px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
        }

        .log-error {
            color: #ef4444;
        }

        .log-warn {
            color: #fbbf24;
        }

        .log-info {
            color: #3b82f6;
        }

        video {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            border: 2px solid #3b82f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔧 تشخيص مشكلة مشغل الفيديو</h1>

        <!-- قسم معلومات النظام -->
        <div class="diagnostic-section">
            <h2>1️⃣ معلومات النظام والمتصفح</h2>
            <div id="systemInfo"></div>
            <button onclick="checkSystemInfo()">فحص المعلومات</button>
            <button onclick="clearLogs()">حذف السجلات</button>
        </div>

        <!-- قسم الاتصال -->
        <div class="diagnostic-section">
            <h2>2️⃣ اختبار الاتصال</h2>
            <div id="connectionStatus"></div>
            <button onclick="testConnections()">اختبار جميع الاتصالات</button>
        </div>

        <!-- قسم اختبار الفيديو المحلي -->
        <div class="diagnostic-section">
            <h2>3️⃣ اختبار رابط الفيديو</h2>
            <div class="info-box">
                📝 ادخل رابط الفيديو أدناه لاختبار تحميله
            </div>
            <textarea id="videoUrl" placeholder="https://example.com/video.mp4"></textarea>
            <button onclick="testVideoUrl()">اختبار الرابط</button>
            <video id="testVideo" style="display:none;"></video>
        </div>

        <!-- قسم السجلات -->
        <div class="diagnostic-section">
            <h2>4️⃣ السجلات والأخطاء</h2>
            <div class="log-output" id="logOutput">
                <div class="log-line log-info">📌 انتظر... السجلات ستظهر هنا</div>
            </div>
        </div>

        <!-- قسم الاختبار الشامل -->
        <div class="diagnostic-section">
            <h2>5️⃣ اختبار شامل</h2>
            <button onclick="runFullDiagnostic()">تشغيل التشخيص الكامل</button>
            <button onclick="generateReport()">إنشاء تقرير</button>
        </div>
    </div>

    <script>
        // نظام السجلات المتقدم
        const logs = [];

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('ar-EG');
            logs.push({ message, type, timestamp });
            updateLogOutput();
        }

        function updateLogOutput() {
            const logOutput = document.getElementById('logOutput');
            logOutput.innerHTML = logs.map(log => {
                const className = `log-line log-${log.type}`;
                const icon = log.type === 'error' ? '❌' : log.type === 'warn' ? '⚠️' : 'ℹ️';
                return `<div class="${className}">[${log.timestamp}] ${icon} ${log.message}</div>`;
            }).join('');
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        function clearLogs() {
            logs.length = 0;
            addLog('تم حذف السجلات', 'info');
        }

        // معالج الأخطاء العام
        window.addEventListener('error', (e) => {
            addLog(`خطأ: ${e.message} (${e.filename}:${e.lineno})`, 'error');
        });

        // فحص معلومات النystem
        function checkSystemInfo() {
            addLog('بدء فحص معلومات النظام...', 'info');

            const video = document.createElement('video');
            const info = {
                'المتصفح': navigator.userAgent.substring(0, 40) + '...',
                'نظام التشغيل': navigator.platform,
                'دعم HTML5 Video': video.canPlayType ? '✅' : '❌',
                'دعم MP4 (H.264)': video.canPlayType('video/mp4; codecs="avc1.42E01E"') ? '✅' : '❌',
                'دعم WebM': video.canPlayType('video/webm') ? '✅' : '❌',
                'دعم Ogg': video.canPlayType('video/ogg') ? '✅' : '❌',
                'دعم HLS': video.canPlayType('application/x-mpegURL') || video.canPlayType('application/vnd.apple.mpegurl') ? '✅' : '❌',
                'Pixel Ratio': (window.devicePixelRatio || 1) + 'x',
                'حجم الشاشة': window.innerWidth + 'x' + window.innerHeight,
                'اتصال الإنترنت': navigator.onLine ? '✅ متصل' : '❌ غير متصل',
                'ذاكرة الجهاز': navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'غير محدد',
                'عدد المعالجات': navigator.hardwareConcurrency || 'غير محدد'
            };

            let html = '';
            for (const [key, value] of Object.entries(info)) {
                html += `<div class="status-item">
                    <span class="status-label">${key}</span>
                    <span class="status-value">${value}</span>
                </div>`;
                addLog(`${key}: ${value}`, 'info');
            }

            document.getElementById('systemInfo').innerHTML = html;
        }

        // اختبار الاتصالات
        async function testConnections() {
            addLog('بدء اختبار الاتصالات...', 'info');

            const servers = [
                { name: 'السرفر المحلي', url: 'http://localhost:8000' },
                { name: 'Supabase', url: 'https://supabase.co' },
                { name: 'Google', url: 'https://google.com' },
                { name: 'YouTube', url: 'https://youtube.com' },
                { name: 'Amazon S3', url: 'https://s3.amazonaws.com' }
            ];

            for (const server of servers) {
                try {
                    const response = await fetch(server.url, { method: 'HEAD', mode: 'no-cors' });
                    addLog(`✅ ${server.name}: متصل`, 'info');
                } catch (error) {
                    addLog(`❌ ${server.name}: غير متصل - ${error.message}`, 'error');
                }
            }
        }

        // اختبار رابط الفيديو
        async function testVideoUrl() {
            const url = document.getElementById('videoUrl').value.trim();

            if (!url) {
                addLog('⚠️ يرجى إدخال رابط الفيديو أولاً', 'warn');
                return;
            }

            addLog(`اختبار الرابط: ${url}`, 'info');

            const video = document.getElementById('testVideo');
            video.style.display = 'block';

            // اختبار HTTP HEAD request
            try {
                const headResponse = await fetch(url, { method: 'HEAD', mode: 'cors' });
                addLog(`HTTP Status: ${headResponse.status}`, headResponse.status === 200 ? 'info' : 'warn');

                const contentType = headResponse.headers.get('content-type');
                addLog(`Content-Type: ${contentType}`, 'info');

                const contentLength = headResponse.headers.get('content-length');
                const sizeMB = contentLength ? (parseInt(contentLength) / (1024 * 1024)).toFixed(2) : 'غير معروف';
                addLog(`حجم الملف: ${sizeMB} MB`, 'info');

                // اختبار CORS headers
                addLog(`Access-Control-Allow-Origin: ${headResponse.headers.get('access-control-allow-origin') || 'غير محدد'}`, 'info');
            } catch (error) {
                addLog(`خطأ في HTTP HEAD request: ${error.message}`, 'error');
            }

            // اختبار تحميل الفيديو
            video.src = url;

            video.addEventListener('loadstart', () => {
                addLog('📺 بدء تحميل الفيديو...', 'info');
            });

            video.addEventListener('canplay', () => {
                addLog(`✅ يمكن تشغيل الفيديو (${video.duration.toFixed(2)}s)`, 'info');
            });

            video.addEventListener('error', () => {
                const error = video.error;
                addLog(`❌ خطأ في الفيديو: ${error.message || 'خطأ غير محدد'}`, 'error');
            });

            video.addEventListener('loadedmetadata', () => {
                addLog(`📐 دقة الفيديو: ${video.videoWidth}x${video.videoHeight}`, 'info');
            });
        }

        // التشخيص الكامل
        async function runFullDiagnostic() {
            addLog('🔍 بدء التشخيص الشامل...', 'info');

            checkSystemInfo();
            await new Promise(r => setTimeout(r, 500));

            await testConnections();
            await new Promise(r => setTimeout(r, 500));

            // اختبار Supabase connection
            if (window.supabaseClient) {
                try {
                    addLog('اختبار اتصال Supabase...', 'info');
                    await window.supabaseClient.from('courses').select('count').limit(1);
                    addLog('✅ اتصال Supabase ناجح', 'info');
                } catch (error) {
                    addLog(`❌ خطأ في Supabase: ${error.message}`, 'error');
                }
            } else {
                addLog('⚠️ Supabase client غير متوفر', 'warn');
            }

            addLog('✅ انتهى التشخيص الشامل', 'info');
        }

        // إنشاء تقرير
        function generateReport() {
            const report = {
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                logs: logs,
                url: window.location.href
            };

            const reportJson = JSON.stringify(report, null, 2);
            console.log('%c📋 تقرير التشخيص:', 'color: #3b82f6; font-size: 1.2rem;', reportJson);

            addLog('✅ تم إنشاء التقرير وحفظه في console', 'info');

            // نسخ التقرير إلى clipboard
            navigator.clipboard.writeText(reportJson).then(() => {
                addLog('✅ تم نسخ التقرير إلى clipboard', 'info');
            }).catch(() => {
                addLog('⚠️ فشل نسخ التقرير إلى clipboard', 'warn');
            });
        }

        // تحميل صفحة الفحص تلقائياً
        window.addEventListener('load', () => {
            addLog('✅ تم تحميل صفحة التشخيص بنجاح', 'info');
            addLog('📌 استخدم الأزرار أعلاه لتشخيص المشاكل', 'info');
        });
    </script>
</body>

</html>
